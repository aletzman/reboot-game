<svg xmlns="http://www.w3.org/2000/svg" width="80" height="64" viewBox="0 0 80 64">
  <defs>
    <!-- Gradientes Generador Apagado (Naranja/Ámbar oscuro) -->
    <linearGradient id="topGen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f1500" />
      <stop offset="100%" stop-color="#120c00" />
    </linearGradient>
    <linearGradient id="leftGen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#170f00" />
      <stop offset="100%" stop-color="#0a0600" />
    </linearGradient>
    <linearGradient id="rightGen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#120b00" />
      <stop offset="100%" stop-color="#050300" />
    </linearGradient>
  </defs>

  <!-- Cara lateral Izquierda -->
  <polygon points="0,23 40,46 40,64 0,41" fill="url(#leftGen)" stroke="#050300" stroke-width="0.5"/>
  <!-- Rejillas de ventilación matemática y simétricamente perfectas -->
  <path d="M10,28.75 L10,46.75 M20,34.5 L20,52.5 M30,40.25 L30,58.25" fill="none" stroke="#7a4b12" stroke-width="1.5" opacity="0.6"/>

  <!-- Cara lateral Derecha -->
  <polygon points="40,46 80,23 80,41 40,64" fill="url(#rightGen)" stroke="#050300" stroke-width="0.5"/>
  <path d="M70,28.75 L70,46.75 M60,34.5 L60,52.5 M50,40.25 L50,58.25" fill="none" stroke="#7a4b12" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Cara Superior -->
  <polygon points="40,0 80,23 40,46 0,23" fill="url(#topGen)"/>

  <!-- Pista hundida o Bisel interior (apagado) -->
  <polygon points="40,4 73,23 40,42 7,23" fill="none" stroke="#7a4b12" stroke-width="1.5" stroke-linejoin="round" opacity="0.7"/>

  <!-- Rutas de energía perfectas conectando al bisel -->
  <path d="M40,11.5 L40,4 M40,34.5 L40,42 M20,23 L7,23 M60,23 L73,23" fill="none" stroke="#7a4b12" stroke-width="1.5" opacity="0.8"/>

  <!-- Núcleo central isométrico matemático tenue (diamantes concéntricos) -->
  <polygon points="40,11.5 60,23 40,34.5 20,23" fill="none" stroke="#965c15" stroke-width="1.5"/>
  <polygon points="40,15.5 53,23 40,30.5 27,23" fill="#7a4b12"/>
</svg>
