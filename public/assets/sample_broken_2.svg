<svg xmlns="http://www.w3.org/2000/svg" width="80" height="64" viewBox="0 0 80 64">
  <defs>
    <!-- Gradientes rotos / error -->
    <linearGradient id="topBroken" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#150d1e" />
      <stop offset="100%" stop-color="#0c0712" />
    </linearGradient>
    <linearGradient id="leftBroken" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#100a16" />
      <stop offset="100%" stop-color="#060409" />
    </linearGradient>
    <linearGradient id="rightBroken" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c0812" />
      <stop offset="100%" stop-color="#040306" />
    </linearGradient>
    <radialGradient id="errGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7F77DD" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7F77DD" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Aura tenue morada de error -->
  <polygon points="30,-5 90,23 30,51 -5,23" fill="url(#errGlow)"/>

  <!-- Cara lateral Izquierda -->
  <polygon points="0,23 40,46 40,64 0,41" fill="url(#leftBroken)"/>
  <path d="M15,34 L25,48 M30,40 L35,55" fill="none" stroke="#000000" stroke-width="1.5"/>

  <!-- Cara lateral Derecha -->
  <polygon points="40,46 80,23 80,41 40,64" fill="url(#rightBroken)"/>
  
  <!-- Cara Superior (Diamante) -->
  <polygon points="40,0 80,23 40,46 0,23" fill="url(#topBroken)"/>

  <!-- Pista hundida o Bisel interior sutil para unificación con la escena -->
  <polygon points="40,4 73,23 40,42 7,23" fill="none" stroke="#040608AA" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Grieta principal (Neon Morado del error / FRAG style) -->
  <path d="M20,12 L35,18 L32,25 L50,32 L45,40 L65,30" fill="none" stroke="#7F77DD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="drop-shadow(0 0 2px #7F77DD)"/>
  <path d="M20,12 L35,18 L32,25 L50,32 L45,40 L65,30" fill="none" stroke="#ffffff" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Partículas pequeñas de fallo -->
  <circle cx="25" cy="20" r="1.5" fill="#7F77DD" opacity="0.6"/>
  <circle cx="45" cy="22" r="1" fill="#7F77DD" opacity="0.8"/>
  <circle cx="55" cy="38" r="1" fill="#7F77DD" opacity="0.7"/>

  <!-- Borde oscuro -->
  <polygon points="40,0.5 79.5,23 40,45.5 0.5,23" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
</svg>
