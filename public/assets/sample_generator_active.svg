<svg xmlns="http://www.w3.org/2000/svg" width="80" height="64" viewBox="0 0 80 64">
  <defs>
    <!-- Gradientes Generador Activado (Naranja Brillante, NO verde) -->
    <linearGradient id="topGenAct" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d2800" />
      <stop offset="100%" stop-color="#211500" />
    </linearGradient>
    <linearGradient id="leftGenAct" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#301f00" />
      <stop offset="100%" stop-color="#140d00" />
    </linearGradient>
    <linearGradient id="rightGenAct" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#241700" />
      <stop offset="100%" stop-color="#0d0800" />
    </linearGradient>
  </defs>

  <!-- Cara lateral Izquierda -->
  <polygon points="0,23 40,46 40,64 0,41" fill="url(#leftGenAct)" stroke="#1a1000" stroke-width="0.5"/>
  <!-- Rejillas activas brillantes -->
  <path d="M10,28.75 L10,46.75 M20,34.5 L20,52.5 M30,40.25 L30,58.25" fill="none" stroke="#EF9F27" stroke-width="1.5" filter="drop-shadow(0 0 2px #EF9F27)"/>

  <!-- Cara lateral Derecha -->
  <polygon points="40,46 80,23 80,41 40,64" fill="url(#rightGenAct)" stroke="#1a1000" stroke-width="0.5"/>
  <!-- Rejillas activas brillantes -->
  <path d="M70,28.75 L70,46.75 M60,34.5 L60,52.5 M50,40.25 L50,58.25" fill="none" stroke="#EF9F27" stroke-width="1.5" filter="drop-shadow(0 0 2px #EF9F27)"/>
  
  <!-- Cara Superior -->
  <polygon points="40,0 80,23 40,46 0,23" fill="url(#topGenAct)"/>

  <!-- Pista hundida o Bisel interior que se enciende con el generador -->
  <polygon points="40,4 73,23 40,42 7,23" fill="none" stroke="#EF9F27" stroke-width="1.5" stroke-linejoin="round" filter="drop-shadow(0 0 3px #EF9F27)"/>

  <!-- Rutas de energía activadas intensas conectando al bisel -->
  <path d="M40,11.5 L40,4 M40,34.5 L40,42 M20,23 L7,23 M60,23 L73,23" fill="none" stroke="#EF9F27" stroke-width="2" filter="drop-shadow(0 0 2px #EF9F27)"/>

  <!-- Núcleo central activo (Naranja y Blanco incandescente) -->
  <polygon points="40,11.5 60,23 40,34.5 20,23" fill="none" stroke="#EF9F27" stroke-width="2" filter="drop-shadow(0 0 2px #EF9F27)"/>
  <polygon points="40,15.5 53,23 40,30.5 27,23" fill="#ffffff" filter="drop-shadow(0 0 4px #EF9F27)"/>
</svg>
