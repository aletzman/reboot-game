<svg xmlns="http://www.w3.org/2000/svg" width="80" height="64" viewBox="0 0 80 64">
  <defs>
    <!-- Brillo interno radial, más fuerte en el centro, más oscuro hacia los bordes -->
    <radialGradient id="topAct" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#88ef44" />
      <stop offset="60%" stop-color="#55e200" />
      <stop offset="100%" stop-color="#1a4d00" />
    </radialGradient>
    <linearGradient id="leftAct" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#143b00" />
      <stop offset="100%" stop-color="#050f00" />
    </linearGradient>
    <linearGradient id="rightAct" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#102e00" />
      <stop offset="100%" stop-color="#030800" />
    </linearGradient>
  </defs>

  <!-- Cara lateral Izquierda -->
  <polygon points="0,23 40,46 40,64 0,41" fill="url(#leftAct)" stroke="#050f00" stroke-width="0.5"/>
  <!-- Cara lateral Derecha -->
  <polygon points="40,46 80,23 80,41 40,64" fill="url(#rightAct)" stroke="#050f00" stroke-width="0.5"/>
  
  <!-- Cara Superior verde lisa con iluminación interna concentrada, sin líneas ni bordes extra -->
  <polygon points="40,0 80,23 40,46 0,23" fill="url(#topAct)"/>

  <!-- Pista hundida / Bisel interior sutil, para mantener estilo continuo con el piso -->
  <polygon points="40,4 73,23 40,42 7,23" fill="none" stroke="#033506aa" stroke-width="1.5" stroke-linejoin="round"/>
</svg>
